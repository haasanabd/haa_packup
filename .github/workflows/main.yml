name: Flutter Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4 # تم التحديث للنسخة 4

      - name: Install Java
        uses: actions/setup-java@v4 # تم التحديث للنسخة 4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4 # تم التحديث للنسخة 4 (هنا كان الخطأ)
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
